{% load static %}
<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{% block title %}DeuPal{% endblock %}</title>
    <meta name="description"
        content="Learn the 500 most common German words with Nepali translations using interactive flashcards.">

    <!-- Anti-flash: apply saved theme before paint -->
    <script>
        (function () {
            const theme = localStorage.getItem('theme');
            if (theme === 'light') {
                document.documentElement.classList.remove('dark');
            }
        })();
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            200: '#bae6fd',
                            300: '#7dd3fc',
                            400: '#38bdf8',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            700: '#0369a1',
                            800: '#075985',
                            900: '#0c4a6e',
                        }
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>

<body class="min-h-screen font-sans transition-colors duration-300
             bg-gradient-to-br from-sky-50 via-blue-50 to-cyan-50 text-slate-800
             dark:!bg-black dark:text-white">

    <!-- Top-Right Action Buttons Container -->
    <div class="fixed top-5 right-5 z-50 flex flex-col gap-4 sm:gap-5">
        <!-- Theme Toggle Button -->
        <button id="theme-toggle" type="button" aria-label="Toggle light/dark mode" class="theme-toggle p-3 rounded-full
                   bg-white/80 dark:bg-black/90 backdrop-blur-md
                   border border-sky-200 dark:border-sky-800/50
                   shadow-lg shadow-sky-500/10 dark:shadow-sky-500/5
                   hover:scale-110 active:scale-95
                   transition-all duration-300 cursor-pointer group">
            <!-- Sun icon (shown in dark mode) -->
            <svg id="icon-sun"
                class="w-5 h-5 text-amber-400 hidden dark:block transition-transform duration-500 group-hover:rotate-45"
                xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" />
            </svg>
            <!-- Moon icon (shown in light mode) -->
            <svg id="icon-moon"
                class="w-5 h-5 text-sky-600 block dark:hidden transition-transform duration-500 group-hover:-rotate-12"
                xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" />
            </svg>
        </button>

        {% block top_right_buttons %}{% endblock %}
    </div>

    <!-- User Nav Bar -->
    {% if user.is_authenticated %}
    <nav class="fixed top-5 left-5 z-50 flex items-center gap-3">
        <div class="flex items-center gap-2 px-4 py-2 rounded-full
                    bg-white/80 dark:bg-black/90 backdrop-blur-md
                    border border-sky-200 dark:border-sky-800/50
                    shadow-lg shadow-sky-500/10 dark:shadow-sky-500/5">
            <!-- User avatar -->
            <div
                class="w-7 h-7 rounded-full bg-gradient-to-br from-sky-400 to-cyan-500 flex items-center justify-center text-white text-xs font-bold">
                {{ user.email|first|upper }}
            </div>
            <span
                class="text-sm font-medium text-slate-700 dark:text-slate-200 hidden sm:inline max-w-[140px] truncate">
                {{ user.email }}
            </span>
            <a href="{% url 'account_logout' %}"
                class="ml-2 text-xs font-semibold text-rose-500 hover:text-rose-400 transition-colors">
                Logout
            </a>
        </div>
    </nav>
    {% endif %}

    {% block content %}{% endblock %}
    <script src="{% static 'js/app.js' %}"></script>
</body>

</html>
